
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 퍼즐 천국</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel" src="./sliding.jsx"></script>
    <script type="text/babel" src="./tetris.jsx"></script>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // 현재 선택된 게임 상태 (null이면 메인 리스트)
            const [currentGame, setCurrentGame] = useState(null);

            // 게임 리스트 데이터 (추후 다른 게임이 추가되면 여기에 객체 추가)
            const games = [
                { id: 'sliding', title: '🧩 슬라이딩 퍼즐', description: '숫자를 순서대로 맞추는 클래식 퍼즐 게임', component: <SlidingPuzzle goBack={() => setCurrentGame(null)} /> },
                { id: 'tetris', title: '🧱 테트리스', description: '내려오는 블록을 빈틈없이 채워 한 줄을 제거하세요!', component: <Tetris goBack={() => setCurrentGame(null)} /> }
            ];

            return (
                <div class="container mx-auto px-4 py-8 max-w-4xl">
                    <header class="text-center mb-10">
                        <h1 class="text-4xl font-extrabold text-indigo-600 drop-shadow-sm cursor-pointer" onClick={() => setCurrentGame(null)}>
                            🎮 미니 퍼즐 천국
                        </h1>
                        <p class="text-slate-500 mt-2">원하는 퍼즐 게임을 골라 즐겨보세요!</p>
                    </header>

                    {currentGame === null ? (
                        /* 게임 선택 리스트 */
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {games.map(game => (
                                <div key={game.id} class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition-all border border-slate-200 flex flex-col justify-between">
                                    <div>
                                        <h2 class="text-2xl font-bold mb-2 text-slate-700">{game.title}</h2>
                                        <p class="text-slate-500 mb-6">{game.description}</p>
                                    </div>
                                    <button 
                                        onClick={() => setCurrentGame(game.id)}
                                        class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl transition-colors cursor-pointer"
                                    >
                                        게임 시작하기
                                    </button>
                                </div>
                            ))}
                        </div>
                    ) : (
                        /* 선택된 게임 화면 렌더링 */
                        <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 animate-fade-in">
                            {games.find(g => g.id === currentGame)?.component}
                        </div>
                    )}
                </div>
            );
        }

        // React 18 루트 렌더링
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
